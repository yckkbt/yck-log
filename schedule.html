<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YCK 月次スケジュール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2a6c;--blue:#2563eb;--blue-l:#dbeafe;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --teal:#0d9488;--teal-l:#ccfbf1;
  --green:#16a34a;--green-l:#dcfce7;
  --amber:#d97706;--amber-l:#fef3c7;
  --orange:#ea580c;--orange-l:#ffedd5;
  --red:#dc2626;--red-l:#fee2e2;
  --bg:#f0f2f8;--surface:#fff;--border:#dde2f0;--border-s:#b8c0d8;
  --text:#1a1c2e;--muted:#5a6080;--hint:#9098b8;
  --sans:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;}

/* ヘッダー */
.header{background:linear-gradient(135deg,var(--navy) 0%,#1e40af 60%,var(--purple) 100%);padding:0 1rem;display:flex;align-items:center;gap:.75rem;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(26,42,108,.25);}
.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:12px;white-space:nowrap;}
.header-brand{font-family:var(--mono);font-size:12px;font-weight:500;color:#fff;white-space:nowrap;}
.header-user{margin-left:auto;font-size:11px;color:rgba(255,255,255,.7);font-family:var(--mono);white-space:nowrap;}

/* ツールバー */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.5rem .75rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:52px;z-index:100;box-shadow:0 1px 4px rgba(26,42,108,.06);}
.month-nav{display:flex;align-items:center;gap:4px;}
.nav-btn{width:28px;height:28px;border:1.5px solid var(--border-s);background:#fff;border-radius:var(--r);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.month-label{font-size:14px;font-weight:700;color:var(--text);min-width:80px;text-align:center;font-family:var(--mono);}
.tsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.tb-select{padding:5px 6px;border:1.5px solid var(--border-s);border-radius:var(--r);font-size:12px;background:#f8f9ff;color:var(--text);max-width:100px;}
.tb-btn{padding:5px 10px;border:none;border-radius:var(--r);font-size:11px;cursor:pointer;font-weight:500;white-space:nowrap;}
.tb-btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;}
.tb-btn-green{background:linear-gradient(135deg,var(--teal),var(--green));color:#fff;}
.tb-btn-amber{background:linear-gradient(135deg,var(--amber),var(--orange));color:#fff;}
.tb-btn-outline{background:#fff;border:1.5px solid var(--border-s);color:var(--muted);}
.tb-btn-outline:hover,.tb-btn-outline.active{border-color:var(--blue);color:var(--blue);background:var(--blue-l);}
.tb-btn-red{background:var(--red);color:#fff;}

/* メイン */
.main{padding:.5rem .75rem 4rem;max-width:900px;margin:0 auto;}

/* 凡例 */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.5rem;align-items:center;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;}

/* カレンダー（縦並び） */
.cal-container{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(26,42,108,.06);margin-bottom:1rem;}
.cal-campus-label{padding:6px 12px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;}
.cal-campus-honko{background:linear-gradient(135deg,var(--navy),var(--blue));}
.cal-campus-nanko{background:linear-gradient(135deg,var(--teal),var(--green));}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.cal-dow{padding:4px 2px;text-align:center;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--muted);}
.cal-dow.sun{color:var(--red);}
.cal-dow.sat{color:var(--blue);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:80px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:2px;position:relative;cursor:pointer;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-month{background:#f8f9ff;opacity:.6;}
.cal-cell.today{background:linear-gradient(180deg,#eff6ff,#fff);}
.cell-date{font-size:9px;font-weight:600;color:var(--text);width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);margin-bottom:1px;}
.cell-date.sun{color:var(--red);}
.cell-date.sat{color:var(--blue);}
.today .cell-date{background:var(--blue);color:#fff;border-radius:50%;}
.chip{font-size:8px;border-radius:2px;padding:1px 2px;margin-bottom:1px;cursor:pointer;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;border-left:2px solid;}
.chip-event{background:var(--amber-l);color:#92400e;border-color:var(--amber);}
.chip-school{background:var(--red-l);color:#7f1d1d;border-color:var(--red);}
.chip-holiday{background:#f3f4f6;color:var(--hint);border-color:#9ca3af;}
.chip-shift{border-left:2px solid;}
.campus-divider{font-size:8px;font-weight:700;padding:1px 2px;margin-top:3px;margin-bottom:1px;}
.campus-divider-honko{color:#1e40af;}
.campus-divider-nanko{color:#0f766e;}
.campus-section{min-height:14px;}
/* コマチップ */
.koma-chip{font-size:8px !important;padding:1px 3px !important;margin-bottom:1px;display:flex !important;align-items:center;gap:3px;}
.chip-koma-badge{font-size:7px;background:rgba(0,0,0,.15);color:inherit;padding:0 3px;border-radius:3px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.chip-mine{outline:1.5px solid rgba(37,99,235,.6);outline-offset:0px;}

/* 週表示 */
.week-table-wrap{overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(100vh - 180px);}
.week-table{width:100%;border-collapse:separate;border-spacing:0;min-width:500px;}
.week-table th{padding:6px 4px;text-align:center;font-size:10px;font-weight:700;font-family:var(--mono);border:1px solid var(--border);background:#f8f9ff;white-space:nowrap;
  position:sticky;top:0;z-index:3;}
.week-table th:first-child{position:sticky;top:0;left:0;z-index:4;background:#f0f4ff;}
.week-table td{padding:3px;border:1px solid var(--border);vertical-align:top;min-width:70px;}
.week-table td.time-col{background:#f8f9ff;font-size:10px;font-weight:700;color:var(--muted);font-family:var(--mono);white-space:nowrap;padding:4px 6px;text-align:right;min-width:60px;
  position:sticky;left:0;z-index:2;}
.week-table td.today-col{background:#eff6ff;}
.week-table td.holiday-col{background:#fff5f5;}
.week-slot{border-radius:4px;padding:3px 5px;margin-bottom:2px;border-left:3px solid;font-size:10px;line-height:1.4;cursor:pointer;}
.week-slot-teacher{font-weight:700;}
.week-slot-students{font-size:9px;opacity:.8;margin-top:1px;}
.week-empty{color:var(--hint);font-size:10px;text-align:center;padding:6px 0;}

/* 振替管理 */
.ab-status-pending{background:var(--red-l);color:#b91c1c;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:600;}
.ab-status-scheduled{background:var(--amber-l);color:#92400e;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:600;}
.ab-status-done{background:var(--green-l);color:#15803d;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:600;}
.ab-table{width:100%;border-collapse:collapse;font-size:12px;}
.ab-table th{font-size:10px;font-weight:700;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);background:#f8f9ff;white-space:nowrap;}
.ab-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ab-table tr:hover td{background:#f8f9ff;}
.ab-done-btn{padding:2px 7px;background:var(--green-l);border:1px solid var(--green);border-radius:4px;font-size:10px;cursor:pointer;color:#15803d;font-weight:500;}
.ab-del-btn{padding:2px 5px;background:none;border:none;font-size:13px;cursor:pointer;color:var(--hint);}
.ab-del-btn:hover{color:var(--red);}

/* パネル */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(26,42,108,.06);}
.panel-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-family:var(--mono);margin-bottom:.75rem;}

/* フォーム */
.ff{margin-bottom:10px;}
.ff label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;font-weight:500;}
.ff input:not([type=checkbox]):not([type=radio]),.ff select,.ff textarea{
  width:100%;padding:8px 10px;border:1.5px solid var(--border-s);border-radius:var(--r);
  font-size:13px;font-family:var(--sans);background:#f8f9ff;color:var(--text);
  -webkit-appearance:none;appearance:none;
}
.ff input:not([type=checkbox]):not([type=radio]):focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--blue);}
.ff input[type=date]{max-width:160px;}
.ff input[type=checkbox],.ff input[type=radio]{
  width:15px;height:15px;accent-color:var(--blue);
  -webkit-appearance:auto;appearance:auto;
  padding:0;border:none;background:none;
}
.ff textarea{min-height:52px;resize:vertical;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.save-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;}
.save-btn-green{background:linear-gradient(135deg,var(--teal),var(--green));}
.save-btn-amber{background:linear-gradient(135deg,var(--amber),var(--orange));}
.save-btn:disabled{opacity:.5;cursor:not-allowed;}

/* シフト一覧 */
.slist{list-style:none;max-height:200px;overflow-y:auto;margin-top:.5rem;}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:4px;background:#f8f9ff;font-size:11px;}
.sitem-left{flex:1;min-width:0;}
.sitem-name{font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sitem-detail{color:var(--muted);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sitem-acts{display:flex;gap:3px;flex-shrink:0;}
.edit-btn2{padding:2px 7px;border:1px solid var(--border-s);background:#fff;border-radius:4px;font-size:10px;cursor:pointer;color:var(--muted);}
.del-btn2{padding:2px 5px;border:none;background:none;font-size:13px;cursor:pointer;color:var(--hint);}
.del-btn2:hover{color:var(--red);}
.locked-badge{font-size:9px;color:var(--hint);padding:2px 5px;background:#f3f4f6;border-radius:3px;}

/* 曜日チェック */
.dow-checks{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.dow-check{display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer;}
.dow-check input{width:15px;height:15px;accent-color:var(--blue);}

/* モーダル（登録パネル含む） */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:var(--rl) var(--rl) 0 0;padding:1.25rem;width:100%;max-width:520px;box-shadow:0 -4px 24px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border-s);border-radius:2px;margin:0 auto 1rem;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--text);}
.modal-acts{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end;}
.modal-cancel{padding:8px 16px;border:1.5px solid var(--border-s);background:#fff;border-radius:var(--r);font-size:13px;cursor:pointer;color:var(--muted);}
.modal-save{padding:8px 16px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;}
.modal-del{padding:8px 16px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;}

/* 一括登録タブ */
.bulk-tab-row{display:flex;gap:6px;margin-bottom:1rem;}
.bulk-tab{flex:1;padding:8px;border:1.5px solid var(--border-s);background:#fff;border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--muted);font-family:var(--sans);font-weight:500;}
.bulk-tab.active{background:var(--blue-l);border-color:var(--blue);color:var(--blue);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;padding:10px 22px;border-radius:30px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;}
.toast.show{opacity:1;}
.loading{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:5px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

.tc0{background:#dbeafe;color:#1e40af;border-color:#2563eb;}
.tc1{background:#dcfce7;color:#15803d;border-color:#16a34a;}
.tc2{background:#ede9fe;color:#5b21b6;border-color:#7c3aed;}
.tc3{background:#fce7f3;color:#9d174d;border-color:#db2777;}
.tc4{background:#ccfbf1;color:#0f766e;border-color:#0d9488;}
.tc5{background:#ffedd5;color:#c2410c;border-color:#ea580c;}
.tc6{background:#fef3c7;color:#92400e;border-color:#d97706;}
.tc7{background:#f3e8ff;color:#6b21a8;border-color:#9333ea;}

/* スマホ最適化 */
@media(max-width:600px){
  .cal-cell{min-height:44px;}
  .chip{font-size:8px;padding:1px 2px;}
  .fr{grid-template-columns:1fr;}
  .ff input[type=date]{max-width:100%;}
}
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="portal.html">← ポータル</a>
  <div style="width:1px;height:18px;background:rgba(255,255,255,.2);"></div>
  <div class="header-brand">YCK スケジュール</div>
  <div class="header-user" id="header-user"></div>
</div>

<div class="toolbar">
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="tsep"></div>
  <select class="tb-select" id="teacher-filter" onchange="renderAll()">
    <option value="">全員</option>
  </select>
  <div class="tsep"></div>
  <button class="tb-btn tb-btn-outline" onclick="goTodayWithPopup()">今日の予定</button>
  <button class="tb-btn tb-btn-outline" id="view-month-btn" onclick="setView('month')">📅月</button>
  <button class="tb-btn tb-btn-outline" id="view-week-btn" onclick="setView('week')">📋週</button>
  <button class="tb-btn tb-btn-outline" id="view-absence-btn" onclick="setView('absence')">🔄振替</button>
  <div class="tsep"></div>
  <button class="tb-btn tb-btn-primary" onclick="openShiftModal()">＋シフト</button>
  <button class="tb-btn tb-btn-green" id="event-btn" onclick="openEventModal()">＋行事</button>
  <button class="tb-btn tb-btn-amber" onclick="openBulkModal()">一括</button>
</div>

<div class="main">
  <div id="loading-overlay" style="text-align:center;padding:3rem;color:var(--muted);font-size:14px;">
    <div style="display:inline-block;width:32px;height:32px;border:3px solid var(--border-s);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:1rem;"></div>
    <div>データを読み込んでいます...</div>
  </div>
  <div id="main-content" style="display:none;">
  <div class="legend" id="legend"></div>

  <!-- 月表示（1カレンダー・上下本校南校） -->
  <div id="month-view">
    <div class="cal-container">
      <div class="cal-dow-row">
        <div class="cal-dow sun">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
        <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div>
        <div class="cal-dow sat">土</div>
      </div>
      <div class="cal-grid" id="cal-unified"></div>
    </div>

    <!-- 今月のシフト一覧 -->
    <div class="panel">
      <div class="panel-title">今月のシフト一覧</div>
      <ul class="slist" id="shift-list"></ul>
    </div>
  </div>

  <!-- 週表示 -->
  <div id="week-view" style="display:none;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:.75rem;flex-wrap:wrap;">
      <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
      <div style="font-size:12px;font-weight:700;color:var(--text);font-family:var(--mono);min-width:180px;text-align:center;" id="week-label"></div>
      <button class="nav-btn" onclick="changeWeek(1)">›</button>
      <div style="display:flex;gap:4px;margin-left:auto;">
        <button class="tb-btn tb-btn-primary" id="campus-honko-btn" onclick="setCampus('本校')" style="font-size:11px;">🏫本校</button>
        <button class="tb-btn tb-btn-outline" id="campus-nanko-btn" onclick="setCampus('南校')" style="font-size:11px;">🏫南校</button>
      </div>
    </div>
    <div class="week-table-wrap">
      <table class="week-table"><thead id="week-thead"></thead><tbody id="week-tbody"></tbody></table>
    </div>
  </div>

  <!-- 振替管理 -->
  <div id="absence-view" style="display:none;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;">
      <div class="panel" style="margin-bottom:0;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:.5rem;font-family:var(--mono);">絞り込み</div>
        <div class="ff"><label>生徒</label><select id="ab-filter-student" onchange="renderAbsenceList()"></select></div>
        <div class="ff"><label>状態</label>
          <select id="ab-filter-status" onchange="renderAbsenceList()">
            <option value="">すべて</option>
            <option value="pending">振替未定</option>
            <option value="scheduled">振替予定</option>
            <option value="done">完了</option>
          </select>
        </div>
      </div>
      <div class="panel" style="margin-bottom:0;background:var(--amber-l);border-color:#fcd34d;">
        <div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:.5rem;">📊 サマリー</div>
        <div id="ab-summary" style="font-size:12px;color:#92400e;"></div>
      </div>
    </div>
    <button class="save-btn" onclick="openAbsenceModal()" style="margin-bottom:.75rem;">＋ 欠席・振替を登録</button>
    <div class="panel" style="padding:0;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="ab-table">
          <thead><tr>
            <th>生徒</th><th>担当</th><th>欠席日</th><th>理由</th><th>振替日</th><th>状態</th><th>備考</th><th></th>
          </tr></thead>
          <tbody id="ab-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
  </div><!-- /main-content -->

<!-- シフト登録モーダル -->
<div class="modal-bg" id="shift-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📅 シフト登録</div>
    <div class="fr">
      <div class="ff"><label>講師名</label><select id="s-teacher"></select></div>
      <div class="ff"><label>教室</label>
        <select id="s-campus"><option value="本校">山口本校</option><option value="南校">山口南校</option></select>
      </div>
    </div>
    <div class="fr">
      <div class="ff"><label>日付</label><input type="date" id="s-date"></div>
      <div class="ff"><label>開始時間</label>
        <select id="s-start">
          <option>10:30（午前）</option><option>14:00（午後）</option>
          <option>16:00（0コマ）</option><option>16:25（0コマ）</option>
          <option>17:30（1コマ）</option><option>19:15（2コマ）</option><option>20:45（3コマ）</option>
        </select>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbz8k41UXf6w3mkSQ3ARc4ReQ_v2xO2t2-xKizYtQ3Y_s2k1iAHEwVNSUlI52V5Go4NsZg/exec';
const TEACHER_COLORS=['tc0','tc1','tc2','tc3','tc4','tc5','tc6','tc7'];
const HOLIDAYS={'2026-01-01':1,'2026-01-12':1,'2026-02-11':1,'2026-02-23':1,'2026-03-20':1,'2026-04-29':1,'2026-05-03':1,'2026-05-04':1,'2026-05-05':1,'2026-05-06':1,'2026-07-20':1,'2026-08-11':1,'2026-09-21':1,'2026-09-23':1,'2026-10-12':1,'2026-11-03':1,'2026-11-23':1};

let curYear=new Date().getFullYear(), curMonth=new Date().getMonth();
let shifts=[], events=[], teachers=[], master={}, teacherColorMap={};
let startTimes=[];
let currentUser='', isAdmin=false, editTarget=null;
let currentView='month', currentWeekStart=null, currentCampus='本校';
let absences=[];

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
let _pending=new Set();
async function api(action,body={},retry=2){
  let lastErr;
  for(let i=0;i<=retry;i++){
    try{
      const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...body})});
      if(!res.ok) throw new Error('HTTP '+res.status);
      return await res.json();
    }catch(e){
      lastErr=e;
      if(i<retry) await new Promise(r=>setTimeout(r,1000*(i+1)));
    }
  }
  throw lastErr;
}
function toDateStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

async function init(){
  const pw=sessionStorage.getItem('yck_pw');
  if(!pw){window.location.href='portal.html';return;}

  currentUser=sessionStorage.getItem('yck_user')||'';


  // GASから最新データを取得
  try{
    const[mRes,sRes,eRes,nRes,aRes,stRes]=await Promise.all([
      api('getMaster'),api('getShifts'),api('getEvents'),api('getNotices'),api('getAbsences'),api('getStartTimes')
    ]);
    master=(mRes&&mRes.master)||{students:[],teachers:[],subjects:[]};
    teachers=master.teachers||[];
    shifts=(sRes&&sRes.shifts)||[];
    events=(eRes&&eRes.events)||[];
    absences=(aRes&&aRes.absences)||[];
    startTimes=(stRes&&stRes.startTimes)||['10:30（午前）','14:00（午後）','16:00（0コマ）','16:25（0コマ）','17:30（1コマ）','19:15（2コマ）','20:45（3コマ）'];

    // キャッシュに保存

    isAdmin=!teachers.includes(currentUser)||currentUser==='';
    document.getElementById('header-user').textContent=isAdmin?'👑 塾長':'👤 '+currentUser;
    if(!isAdmin) document.getElementById('event-btn').style.display='none';
    teachers.forEach((t,i)=>teacherColorMap[t]=TEACHER_COLORS[i%TEACHER_COLORS.length]);
    currentWeekStart=currentWeekStart||getWeekStart(new Date());
    rebuildSelects();
    rebuildAbsenceSelects();
    setDefaultDates();
    document.getElementById('loading-overlay').style.display='none';
    document.getElementById('main-content').style.display='block';
    renderAll();
  }catch(e){
    if(!cached) alert('データ取得エラー：'+e.message);
  }
}

function setDefaultDates(){
  const today=toDateStr(new Date());
  document.getElementById('s-date').value=today;
  document.getElementById('e-start').value=today;
  document.getElementById('e-end').value=today;
  document.getElementById('ab-absent').value=today;
  document.getElementById('bw-from').value=`${curYear}-${String(curMonth+1).padStart(2,'0')}-01`;
  document.getElementById('bw-to').value=toDateStr(new Date(curYear,curMonth+1,0));
}

function rebuildStartTimesSelects(){
  // 全ての開始時間プルダウンを更新
  ['s-start','bw-start'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    const cur=el.value;
    el.innerHTML=startTimes.map(t=>'<option value="'+t+'">'+t+'</option>').join('');
    // 現在の値が存在すれば保持
    if(startTimes.includes(cur)) el.value=cur;
  });
}

function rebuildSelects(){
  const pop=(id,arr,addAll)=>{
    const el=document.getElementById(id);if(!el)return;
    const cur=el.value;
    el.innerHTML=addAll?'<option value="">全員</option>':'';
    arr.forEach(t=>{const o=document.createElement('option');o.value=o.textContent=t;el.appendChild(o);});
    el.value=cur;
  };
  pop('teacher-filter',teachers,true);
  const sTeacher=document.getElementById('s-teacher');
  sTeacher.innerHTML='';
  (isAdmin?teachers:[currentUser]).forEach(t=>{const o=document.createElement('option');o.value=o.textContent=t;sTeacher.appendChild(o);});
  pop('bw-teacher',isAdmin?teachers:[currentUser],false);
  rebuildStartTimesSelects();
  const leg=document.getElementById('legend');
  leg.innerHTML=
    '<span class="legend-item"><span class="legend-dot" style="background:var(--amber-l);border:1px solid var(--amber);"></span>塾行事</span>'+
    '<span class="legend-item"><span class="legend-dot" style="background:var(--red-l);border:1px solid var(--red);"></span>学校行事</span>'+
    '<span class="legend-item"><span class="legend-dot" style="background:#f3f4f6;border:1px solid #9ca3af;"></span>休講</span>'+
    teachers.map(t=>`<span class="legend-item"><span class="legend-dot ${teacherColorMap[t]}"></span>${t}</span>`).join('');
}

function rebuildAbsenceSelects(){
  const sNames=(master.students||[]).map(s=>s.name||s);
  const popAll=(id,arr)=>{const el=document.getElementById(id);if(!el)return;el.innerHTML='<option value="">すべて</option>';arr.forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;el.appendChild(o);});};
  const popReq=(id,arr)=>{const el=document.getElementById(id);if(!el)return;el.innerHTML='<option value="">選択</option>';arr.forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;el.appendChild(o);});};
  popReq('ab-student',sNames);popReq('ab-teacher',teachers);
  popAll('ab-filter-student',sNames);
}

function renderAll(){
  updateMonthLabel();
  renderCalUnified();
  renderShiftList();
  renderEventList();
}
function updateMonthLabel(){document.getElementById('month-label').textContent=`${curYear}年${curMonth+1}月`;}
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}else if(curMonth<0){curMonth=11;curYear--;}renderAll();}
function goToday(){curYear=new Date().getFullYear();curMonth=new Date().getMonth();currentWeekStart=getWeekStart(new Date());renderAll();if(currentView==='week')renderWeek();}

function goTodayWithPopup(){
  goToday();
  const today=toDateStr(new Date());
  openTodayTab(today);
}

function openTodayTab(d){
  const dowNames=['日','月','火','水','木','金','土'];
  const dt=new Date(d+'T00:00:00');
  const dow=dowNames[dt.getDay()];

  const dayShiftsHonko=shifts.filter(s=>s.date===d&&(s.campus||'本校')==='本校');
  const dayShiftsNanko=shifts.filter(s=>s.date===d&&s.campus==='南校');
  const dayEvents=events.filter(e=>d>=e.startDate&&d<=e.endDate);

  // 開始時間順にソート
  const sortByTime=(arr)=>[...arr].sort((a,b)=>a.startTime.localeCompare(b.startTime));

  const makeShiftRows=(arr,campusName,color)=>{
    const sorted=sortByTime(arr);
    let content='';
    if(sorted.length){
      // 時間でグループ化
      const groups={};
      sorted.forEach(s=>{
        if(!groups[s.startTime]) groups[s.startTime]=[];
        groups[s.startTime].push(s);
      });
      Object.keys(groups).sort().forEach(time=>{
        content+='<div style="border-bottom:1px solid #e5e7eb;">';
        // 時間ヘッダー
        content+='<div style="padding:8px 14px;background:#f3f4f6;font-size:12px;font-weight:700;color:#374151;font-family:monospace;">🕐 '+time+'</div>';
        // その時間の講師一覧
        groups[time].forEach(s=>{
          content+='<div style="padding:10px 14px;display:grid;grid-template-columns:auto 1fr 1fr;gap:8px;align-items:start;border-top:1px solid #f3f4f6;">';
          content+='<div style="font-weight:700;font-size:14px;white-space:nowrap;">'+s.teacher+'</div>';
          content+='<div style="font-size:12px;color:#374151;">'+(s.format||'')+(s.students?' <span style="color:#6b7280;">/ '+s.students+'</span>':'')+'</div>';
          content+='<div style="font-size:11px;color:#6b7280;">'+s.slots+'コマ'+(s.note?' / '+s.note:'')+'</div>';
          content+='</div>';
        });
        content+='</div>';
      });
    } else {
      content='<div style="padding:16px 14px;color:#9ca3af;text-align:center;font-size:13px;">シフトなし</div>';
    }
    return '<div style="margin-bottom:1.5rem;">'
      +'<div style="padding:8px 14px;background:'+color+';font-weight:700;font-size:13px;border-radius:6px 6px 0 0;">'+campusName+'</div>'
      +'<div style="background:#fff;border-radius:0 0 6px 6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);">'+content+'</div>'
      +'</div>';
  };

  let evHtml='';
  if(dayEvents.length){
    evHtml='<div style="margin-bottom:1rem;">';
    dayEvents.forEach(e=>{
      evHtml+='<div style="padding:10px 14px;background:#fef3c7;border-left:4px solid #d97706;border-radius:4px;margin-bottom:6px;font-size:13px;color:#92400e;">📅 '+e.content+(e.school?' ('+e.school+')':'')+'</div>';
    });
    evHtml+='</div>';
  }

  const pageHTML=`<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>YCK 今日の予定 ${d}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f2f8;color:#1a1c2e;font-size:14px;min-height:100vh;}
.header{background:linear-gradient(135deg,#1a2a6c,#2563eb,#7c3aed);padding:0 1.25rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.header-title{color:#fff;font-weight:700;font-size:15px;}
.header-date{color:rgba(255,255,255,.8);font-size:12px;font-family:monospace;}
.close-btn{color:rgba(255,255,255,.7);background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;}
.close-btn:hover{background:rgba(255,255,255,.25);color:#fff;}
.main{max-width:700px;margin:0 auto;padding:1.25rem 1rem 3rem;}
.date-badge{display:inline-block;padding:6px 16px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:20px;font-size:14px;font-weight:700;margin-bottom:1.25rem;}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">YCK 今日の授業予定</div>
    <div class="header-date">${d}（${dow}）</div>
  </div>
  <button class="close-btn" onclick="window.close()">✕ 閉じる</button>
</div>
<div class="main">
  <div class="date-badge">📅 ${d}（${dow}）</div>
  ${evHtml}
  ${makeShiftRows(dayShiftsHonko,'🏫 山口本校','#dbeafe')}
  ${makeShiftRows(dayShiftsNanko,'🏫 山口南校','#ccfbf1')}
</div>
</body>
</html>`;

  const blob=new Blob([pageHTML],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  window.open(url,'_blank');
}

function renderCalUnified(){
  const grid=document.getElementById('cal-unified');
  if(!grid)return;
  const filter=document.getElementById('teacher-filter').value;
  const today=toDateStr(new Date());
  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const prevDays=new Date(curYear,curMonth,0).getDate();
  let cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({date:null,day:prevDays-i,other:true});
  for(let d=1;d<=daysInMonth;d++){
    const ds=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells.push({date:ds,day:d,other:false});
  }
  const rem=(7-cells.length%7)%7;
  for(let i=1;i<=rem;i++) cells.push({date:null,day:i,other:true});

  const getKomaLabel=(t)=>{const m=t.match(/（(.+)）/);return m?m[1]:t.split('（')[0];};

  const makeChips=(arr)=>arr.sort((a,b)=>a.startTime.localeCompare(b.startTime)).map(s=>{
    const tc=teacherColorMap[s.teacher]||'tc0';
    const canEdit=isAdmin||s.teacher===currentUser;
    const mine=s.teacher===currentUser?' chip-mine':'';
    const editAttr=canEdit?' data-shift-id="'+s.id+'"':'';
    const timeShort=s.startTime.split('（')[0];
    const komaLabel=getKomaLabel(s.startTime);
    const tip=s.teacher+' '+timeShort+(s.students?' / '+s.students:'');
    // チップに時間ラベル付き
    return '<span class="chip chip-shift koma-chip '+tc+mine+'"'+editAttr+' title="'+tip+'">'
      +'<span class="chip-koma-badge">'+komaLabel+'</span>'
      +s.teacher
      +'</span>';
  }).join('');

  grid.innerHTML=cells.map((c,idx)=>{
    const dow=idx%7;
    const isSun=dow===0,isSat=dow===6;
    const isHoliday=c.date&&HOLIDAYS[c.date];
    const isToday=c.date===today;
    let dc='cell-date';if(isSun||isHoliday)dc+=' sun';else if(isSat)dc+=' sat';
    let cc='cal-cell';if(c.other)cc+=' other-month';if(isToday)cc+=' today';

    const dayEvents=c.date?events.filter(e=>c.date>=e.startDate&&c.date<=e.endDate):[];
    const evChips=dayEvents.map(e=>'<span class="chip '+(e.type==='school'?'chip-school':e.type==='holiday'?'chip-holiday':'chip-event')+'">'+e.content+'</span>').join('');

    const honkoShifts=c.date?shifts.filter(s=>s.date===c.date&&(s.campus||'本校')==='本校'&&(!filter||s.teacher===filter)):[];
    const nankoShifts=c.date?shifts.filter(s=>s.date===c.date&&s.campus==='南校'&&(!filter||s.teacher===filter)):[];

    const honkoSection='<div class="campus-divider campus-divider-honko">🔵本校</div><div class="campus-section">'+makeChips(honkoShifts)+'</div>';
    const nankoSection='<div class="campus-divider campus-divider-nanko">🟢南校</div><div class="campus-section">'+makeChips(nankoShifts)+'</div>';
    const dateStr=c.date||'';
    return '<div class="'+cc+'" onclick="onCellClick(\''+dateStr+'\')"><div class="'+dc+'">'+c.day+'</div>'+evChips+honkoSection+nankoSection+'</div>';
  }).join('');
}

function renderCal(campus,gridId){

  const today=toDateStr(new Date());
  const firstDay=new Date(curYear,curMonth,1).getDay();

  const prevDays=new Date(curYear,curMonth,0).getDate();
  let cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({date:null,day:prevDays-i,other:true});
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({date:ds,day:d,other:false});
  }
  const rem=(7-cells.length%7)%7;
  for(let i=1;i<=rem;i++) cells.push({date:null,day:i,other:true});
  grid.innerHTML=cells.map((c,idx)=>{
    const dow=idx%7;
    const isSun=dow===0,isSat=dow===6;
    const isHoliday=c.date&&HOLIDAYS[c.date];
    const isToday=c.date===today;
    let dc='cell-date';if(isSun||isHoliday)dc+=' sun';else if(isSat)dc+=' sat';
    let cc='cal-cell';if(c.other)cc+=' other-month';if(isToday)cc+=' today';
    const dayEvents=c.date?events.filter(e=>c.date>=e.startDate&&c.date<=e.endDate):[];
    const dayShifts=c.date?shifts.filter(s=>s.date===c.date&&(s.campus||'本校')===campus&&(!filter||s.teacher===filter)):[];
    const evChips=dayEvents.map(e=>`<span class="chip ${e.type==='school'?'chip-school':e.type==='holiday'?'chip-holiday':'chip-event'}">${e.content}</span>`).join('');
    const shiftChips=dayShifts.map(s=>{
      const tc=teacherColorMap[s.teacher]||'tc0';
      const canEdit=isAdmin||s.teacher===currentUser;
      const editAttr=canEdit?' data-shift-id="'+s.id+'"':'';
      const mine=s.teacher===currentUser?' chip-mine':'';
      const lbl=s.teacher+' '+s.startTime.split('（')[0];
      return '<span class="chip chip-shift '+tc+mine+'"'+editAttr+'>'+lbl+'</span>';
    }).join('');
    return `<div class="${cc}" onclick="onCellClick('${c.date||''}')"><div class="${dc}">${c.day}</div>${evChips}${shiftChips}</div>`;
  }).join('');
}

  const campus=document.getElementById('s-campus').value;

  const startTime=document.getElementById('s-start').value;

  const [ty,tm,td]=toVal.split('-').map(Number);
  const from=new Date(fy,fm-1,fd);
  const to=new Date(ty,tm-1,td);
  const students=document.getElementById('bw-students').value.trim();
  const note=document.getElementById('bw-note').value.trim();
  if(!teacher||!dows.length){toast('⚠️ 講師・曜日を入力してください');return;}
  if(!isAdmin&&teacher!==currentUser){toast('⚠️ 自分のシフトのみ登録できます');return;}
  const newShifts=[];
  for(let d=new Date(from);d<=to;d=addDays(d,1)){
    if(dows.includes(d.getDay())){
      const ds=toDateStr(d);
      const dup=shifts.some(s=>s.teacher===teacher&&s.date===ds&&s.startTime===startTime&&(s.campus||'本校')===campus);
      if(!dup) newShifts.push({id:'s'+Date.now()+Math.random(),teacher,campus,date:ds,startTime,slots,format,students,note});
    }
  }
  if(!newShifts.length){toast('⚠️ 登録できる日がありません');return;}
  if(!confirm(`${newShifts.length}件登録します。よろしいですか？`))return;
  try{
    const res=await api('bulkAddShifts',{shifts:newShifts});
    if(res.ok){
      shifts.push(...newShifts);
      toast('✅ '+newShifts.length+'件を一括登録しました');closeBulkModal();renderAll();
    }
    else alert('登録に失敗しました：'+JSON.stringify(res));
  }catch(e){alert('通信エラー');}
}

async function execBulkMonth(){
  const text=document.getElementById('bm-text').value.trim();
  if(!text){toast('⚠️ テキストを入力してください');return;}
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const newShifts=[];const errors=[];
  lines.forEach((line,i)=>{
    const parts=line.split(',').map(p=>p.trim());
    if(parts.length<4){errors.push(`行${i+1}: 列が不足`);return;}
    // 形式: 講師名,教室,日付,開始時間,コマ数,授業形式,生徒,備考
    const[teacher,campus,date,startTime,slots='1',format='1対1',students='',note='']=parts;
    if(!teacher||!date||!startTime){errors.push(`行${i+1}: 必須項目不足`);return;}
    if(!isAdmin&&currentUser&&teacher!==currentUser){errors.push(`行${i+1}: 自分以外のシフトは登録不可`);return;}
    newShifts.push({id:'s'+Date.now()+Math.random(),teacher,campus:campus||'本校',date,startTime,slots,format,students,note});
  });
  if(errors.length){alert('エラー：\n'+errors.join('\n'));return;}
  if(!newShifts.length){toast('⚠️ 登録できる行がありません');return;}
  if(!confirm(`${newShifts.length}件登録します。よろしいですか？`))return;
  try{
    const res=await api('bulkAddShifts',{shifts:newShifts});
    if(res.ok){shifts.push(...newShifts);toast(`✅ ${newShifts.length}件を登録しました`);closeBulkModal();renderAll();}
    else alert('登録に失敗しました');
  }catch(e){alert('通信エラー');}
}

// ── 振替管理 ──
async function saveAbsence(){
  const student=document.getElementById('ab-student').value;
  const absentDate=document.getElementById('ab-absent').value;
  if(!student||!absentDate){toast('⚠️ 生徒名と欠席日は必須です');return;}
  const ab={
    id:'ab'+Date.now(),student,
    teacher:document.getElementById('ab-teacher').value,
    absentDate,absentSlot:document.getElementById('ab-slot').value,
    reason:document.getElementById('ab-reason').value,
    makeupDate:document.getElementById('ab-makeup').value||'',
    makeupSlot:document.getElementById('ab-makeup-slot').value||'',
    note:document.getElementById('ab-note').value.trim(),
    status:document.getElementById('ab-makeup').value?'scheduled':'pending'
  };
  const btn=document.getElementById('ab-save-btn');
  btn.innerHTML='<span class="loading"></span>登録中...';btn.disabled=true;
  try{
    const res=await api('addAbsence',{absence:ab});
    if(res.ok){absences.push(ab);toast('✅ 振替を登録しました');closeAbsenceModal();renderAbsenceList();}
  }catch(e){alert('通信エラー');}
  btn.innerHTML='登録する';btn.disabled=false;
}

function openEditAbsence(id){
  const a=absences.find(x=>x.id===id);
  if(!a)return;
  // 欠席モーダルに値をセット
  document.getElementById('ab-student').value=a.student||'';
  document.getElementById('ab-teacher').value=a.teacher||'';
  document.getElementById('ab-absent').value=a.absentDate||'';
  document.getElementById('ab-slot').value=a.absentSlot||'';
  document.getElementById('ab-reason').value=a.reason||'体調不良';
  document.getElementById('ab-makeup').value=a.makeupDate||'';
  document.getElementById('ab-makeup-slot').value=a.makeupSlot||'';
  document.getElementById('ab-note').value=a.note||'';
  // 保存ボタンを「更新」モードに切り替え
  const btn=document.getElementById('ab-save-btn');
  btn.textContent='更新する';
  btn.onclick=function(){updateAbsence(id);};
  openAbsenceModal();
}

async function updateAbsence(id){
  const idx=absences.findIndex(a=>a.id===id);if(idx<0)return;
  const makeupDate=document.getElementById('ab-makeup').value||'';
  const updated={
    ...absences[idx],
    student:document.getElementById('ab-student').value,
    teacher:document.getElementById('ab-teacher').value,
    absentDate:document.getElementById('ab-absent').value,
    absentSlot:document.getElementById('ab-slot').value,
    reason:document.getElementById('ab-reason').value,
    makeupDate,
    makeupSlot:document.getElementById('ab-makeup-slot').value||'',
    note:document.getElementById('ab-note').value.trim(),
    status:makeupDate?'scheduled':absences[idx].status==='done'?'done':'pending'
  };
  const btn=document.getElementById('ab-save-btn');
  btn.innerHTML='<span class="loading"></span>更新中...';btn.disabled=true;
  try{
    const res=await api('updateAbsence',{absence:updated});
    if(res.ok){
      absences[idx]=updated;
      toast('✅ 更新しました');
      closeAbsenceModal();
      // ボタンを登録モードに戻す
      btn.textContent='登録する';
      btn.onclick=saveAbsence;
      renderAbsenceList();
    }
  }catch(e){alert('通信エラー');}
  btn.innerHTML=btn.textContent;btn.disabled=false;
}

async function markAbsenceDone(id){
  const idx=absences.findIndex(a=>a.id===id);if(idx<0)return;
  absences[idx].status='done';
  try{await api('updateAbsence',{absence:absences[idx]});toast('✅ 振替完了');renderAbsenceList();}catch(e){alert('通信エラー');}
}

async function deleteAbsence(id){
  if(!confirm('削除しますか？'))return;
  try{const res=await api('deleteAbsence',{id});if(res.ok){absences=absences.filter(a=>a.id!==id);toast('削除しました');renderAbsenceList();}}catch(e){alert('通信エラー');}
}

function renderAbsenceList(){
  const fs=document.getElementById('ab-filter-student')?.value||'';
  const fst=document.getElementById('ab-filter-status')?.value||'';
  const fl=absences.filter(a=>(!fs||a.student===fs)&&(!fst||a.status===fst)).sort((a,b)=>b.absentDate.localeCompare(a.absentDate));
  const pending=absences.filter(a=>a.status==='pending').length;
  const scheduled=absences.filter(a=>a.status==='scheduled').length;
  const done=absences.filter(a=>a.status==='done').length;
  const sum=document.getElementById('ab-summary');
  if(sum) sum.innerHTML=`振替未定：<strong>${pending}</strong>件　振替予定：<strong>${scheduled}</strong>件　完了：<strong>${done}</strong>件`;
  const tbody=document.getElementById('ab-tbody');
  if(!fl.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--hint);">記録がありません</td></tr>';return;}
  const sl={pending:'<span class="ab-status-pending">未定</span>',scheduled:'<span class="ab-status-scheduled">予定</span>',done:'<span class="ab-status-done">完了</span>'};
  tbody.innerHTML=fl.map(a=>{
    const editBtn=a.status!=='done'?'<button class="ab-done-btn" style="background:var(--blue-l);border-color:var(--blue);color:var(--blue);" onclick="openEditAbsence(\''+a.id+'\')">編集</button>':'';
    const doneBtn=a.status!=='done'?'<button class="ab-done-btn" onclick="markAbsenceDone(\''+a.id+'\')">完了</button>':'';
    const delBtn='<button class="ab-del-btn" onclick="deleteAbsence(\''+a.id+'\')">×</button>';
    const makeupCell=a.makeupDate?a.makeupDate+'<br><span style="color:var(--muted);">'+(a.makeupSlot||'未定')+'</span>':'<span style="color:var(--hint);">未定</span>';
    return '<tr>'
      +'<td style="font-weight:600;">'+a.student+'</td>'
      +'<td style="color:var(--muted);">'+( a.teacher||'')+'</td>'
      +'<td style="font-size:11px;">'+a.absentDate+'<br><span style="color:var(--muted);">'+a.absentSlot+'</span></td>'
      +'<td>'+(a.reason||'')+'</td>'
      +'<td style="font-size:11px;">'+makeupCell+'</td>'
      +'<td>'+(sl[a.status]||a.status)+'</td>'
      +'<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:11px;">'+(a.note||'')+'</td>'
      +'<td style="white-space:nowrap;">'+editBtn+doneBtn+delBtn+'</td>'
      +'</tr>';
  }).join('');
}

// ── 表示切替 ──
function setView(view){
  currentView=view;
  document.getElementById('month-view').style.display=view==='month'?'block':'none';
  document.getElementById('week-view').style.display=view==='week'?'block':'none';
  document.getElementById('absence-view').style.display=view==='absence'?'block':'none';
  ['month','week','absence'].forEach(v=>{
    document.getElementById('view-'+v+'-btn').className='tb-btn tb-btn-outline'+(v===view?' active':'');
  });
  if(view==='week'){if(!currentWeekStart)currentWeekStart=getWeekStart(new Date());renderWeek();}
  if(view==='absence'){rebuildAbsenceSelects();renderAbsenceList();}
}

// ── 週表示 ──
function getWeekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());r.setHours(0,0,0,0);return r;}
function changeWeek(d){currentWeekStart=addDays(currentWeekStart,d*7);renderWeek();}
function setCampus(c){
  currentCampus=c;
  document.getElementById('campus-honko-btn').className='tb-btn '+(c==='本校'?'tb-btn-primary':'tb-btn-outline');
  document.getElementById('campus-nanko-btn').className='tb-btn '+(c==='南校'?'tb-btn-primary':'tb-btn-outline');
  renderWeek();
}

function renderWeek(){
  if(!currentWeekStart)return;
  const days=[];for(let i=0;i<7;i++) days.push(addDays(currentWeekStart,i));
  const today=toDateStr(new Date());
  const dowNames=['日','月','火','水','木','金','土'];
  const ws=days[0],we=days[6];
  document.getElementById('week-label').textContent=`${ws.getMonth()+1}/${ws.getDate()}（${dowNames[ws.getDay()]}）〜 ${we.getMonth()+1}/${we.getDate()}（${dowNames[we.getDay()]}）`;
  curYear=ws.getFullYear();curMonth=ws.getMonth();updateMonthLabel();
  const TIMES=[
    {key:'10:30（午前）',label:'午前'},
    {key:'14:00（午後）',label:'午後'},
    {key:'16:00（0コマ）',label:'0コマ'},
    {key:'16:25（0コマ）',label:'0コマ'},
    {key:'17:30（1コマ）',label:'1コマ'},
    {key:'19:15（2コマ）',label:'2コマ'},
    {key:'20:45（3コマ）',label:'3コマ'},
  ];
  const thead=document.getElementById('week-thead');
  thead.innerHTML='<tr><th style="min-width:50px;">時間</th>'+days.map((d,i)=>{
    const ds=toDateStr(d);const isToday=ds===today;const isHol=HOLIDAYS[ds];
    let cls=isToday?'today-col':isHol||i===0?'sun-col':i===6?'sat-col':'';
    return `<th class="${cls}">${d.getMonth()+1}/${d.getDate()}<br>${dowNames[i]}</th>`;
  }).join('')+'</tr>';
  const tbody=document.getElementById('week-tbody');
  tbody.innerHTML=TIMES.map(time=>{
    const cells=days.map((d,i)=>{
      const ds=toDateStr(d);
      const isToday=ds===today;const isHol=HOLIDAYS[ds];
      let cellCls=isToday?'today-col':isHol||i===0?'holiday-col':'';
      const wFilter=document.getElementById('teacher-filter').value;
      const dayShifts=shifts.filter(s=>s.date===ds&&s.startTime===time.key&&(s.campus||'本校')===currentCampus&&(!wFilter||s.teacher===wFilter));
      const shiftHtml=dayShifts.length===0?'<div class="week-empty">—</div>':dayShifts.map(s=>{
        const tc=teacherColorMap[s.teacher]||'tc0';
        const canEdit=isAdmin||s.teacher===currentUser;
        const onclick=canEdit?'onclick="openEditModal(\'' +s.id+ '\')'  :'';
        return `<div class="week-slot ${tc}" ${onclick}>
          <div class="week-slot-teacher">${s.teacher}</div>
          ${s.students?`<div class="week-slot-students">👤 ${s.students}</div>`:''}
          ${s.format&&s.format!=='1対1'?`<div class="week-slot-students">${s.format}</div>`:''}
        </div>`;
      }).join('');
      return `<td class="${cellCls}">${shiftHtml}</td>`;
    }).join('');
    return `<tr><td class="time-col">${time.label}<br><span style="font-size:9px;">${time.key.split('（')[0]}</span></td>${cells}</tr>`;
  }).join('');
}

// カレンダー・週表示のシフトチップクリックをイベント委任で処理
document.addEventListener('click', function(e){
  const chip = e.target.closest('[data-shift-id]');
  if(chip){
    const id = chip.getAttribute('data-shift-id');
    if(id) openEditModal(id);
  }
});

// モーダル外クリック（背景）で閉じる
['shift-modal','event-modal','bulk-modal','absence-modal','edit-modal'].forEach(id=>{
  const bg=document.getElementById(id);
  // 背景クリックで閉じる
  bg.addEventListener('click',e=>{
    if(e.target===bg){
      bg.classList.remove('open');
      if(id==='edit-modal') editTarget=null;
    }
  });
  // モーダル内コンテンツのクリックは背景に伝播させない
  const modal=bg.querySelector('.modal');
  if(modal) modal.addEventListener('click',e=>e.stopPropagation());
});

init();
